<!DOCTYPE html>
<html>
<head>
    <title>Sorting Algorithm Comparison</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Sorting Algorithm Comparison</h1>

    <p>Compare Bubble Sort, Merge Sort and Quick Sort</p>

    <input
        type="text"
        id="numbers"
        placeholder="5,3,8,1,9">

    <br><br>

    <button onclick="compareSorts()">
        Compare Algorithms
    </button>

    <div id="result"></div>

    <br>

    <canvas id="timeChart"></canvas>

    <h2>Algorithm Complexity Comparison</h2>

    <table>
        <tr>
            <th>Algorithm</th>
            <th>Best Case</th>
            <th>Average Case</th>
            <th>Worst Case</th>
        </tr>

        <tr>
            <td>Bubble Sort</td>
            <td>O(n)</td>
            <td>O(n²)</td>
            <td>O(n²)</td>
        </tr>

        <tr>
            <td>Merge Sort</td>
            <td>O(n log n)</td>
            <td>O(n log n)</td>
            <td>O(n log n)</td>
        </tr>

        <tr>
            <td>Quick Sort</td>
            <td>O(n log n)</td>
            <td>O(n log n)</td>
            <td>O(n²)</td>
        </tr>
    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
